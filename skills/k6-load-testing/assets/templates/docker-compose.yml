services:
  influxdb:
    image: influxdb:1.8
    container_name: k6-influxdb
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    environment:
      - INFLUXDB_DB=${INFLUXDB_DB:-k6}
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - k6-network
    healthcheck:
      test: ["CMD", "influx", "-execute", "SHOW DATABASES"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  grafana:
    image: grafana/grafana:10.2.0
    container_name: k6-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - INFLUXDB_DB=${INFLUXDB_DB:-k6}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    networks:
      - k6-network
    depends_on:
      influxdb:
        condition: service_healthy

  k6:
    image: grafana/k6:0.48.0
    container_name: k6-runner
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/${INFLUXDB_DB:-k6}
      - TARGET_URL=${TARGET_URL:-https://test.k6.io}
    volumes:
      - ./k6/scripts:/scripts
      - ./k6/config:/config
    networks:
      - k6-network
    depends_on:
      - influxdb
    # No ports exposed - run on-demand via: docker-compose run --rm k6 run /scripts/test.js

networks:
  k6-network:
    driver: bridge

volumes:
  influxdb-data:
    driver: local
  grafana-data:
    driver: local
