apiVersion: 1

providers:
  - name: 'k6-dashboards'
    orgId: 1
    folder: 'k6 Load Testing'
    folderUid: 'k6-load-testing-folder'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
