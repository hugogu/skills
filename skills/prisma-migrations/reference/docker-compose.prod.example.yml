# Example docker-compose.prod.yml for production
# Includes automatic Prisma migration on container startup

version: '3.8'

services:
  api:
    build:
      target: production
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
    # Apply migrations before starting server
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/server.js"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
